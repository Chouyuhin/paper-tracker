name: Daily Paper Digest

on:
  schedule:
    # 每天 UTC 12:00 ≈ 北京时间 20:00 / 美东 08:00
    # 11:45 UTC ≈ 7:45 AM EDT (GitHub Actions 有延迟, 实际到 8 点左右)
    - cron: "45 11 * * *"
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch papers and send email
        env:
          SMTP_SERVER:   ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:    ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:      ${{ secrets.EMAIL_TO }}
        run: python src/tracker.py
      - name: Commit last run date
        run: |
          git config user.name "paper-tracker-bot"
          git config user.email "bot@localhost"
          git add .last_run_date
          git diff --staged --quiet || git commit -m "Update last run date"
          git push
