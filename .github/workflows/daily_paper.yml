name: Daily Paper Digest

on:
  schedule:
    # 每 15 分钟跑一次检查, 直到当天任务完成
    - cron: "*/15 7-15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if already ran today
        id: check
        run: |
          if [ -f .last_run_date ] && [ "$(cat .last_run_date)" = "$(date +%Y-%m-%d)" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already ran today — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Fetch papers and send email
        if: steps.check.outputs.skip == 'false'
        env:
          SMTP_SERVER:   ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:    ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:      ${{ secrets.EMAIL_TO }}
        run: python src/tracker.py

      - name: Commit last run date
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "paper-tracker-bot"
          git config user.email "bot@localhost"
          git add .last_run_date
          git diff --staged --quiet || git commit -m "Update last run date"
          git push
